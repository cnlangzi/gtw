name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run unit tests
        run: |
          node --test \
            utils/git.test.js \
            utils/git.checkout.test.js \
            utils/labels.test.js \
            commands/WatchCommand.test.js \
            commands/ReviewCommand.test.js

  e2e-workflow-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run E2E workflow tests
        run: node --test commands/e2e/workflow.test.js
